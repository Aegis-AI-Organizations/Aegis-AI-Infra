services:
  # --- Infrastructure ---
  db:
    image: postgres:16-alpine
    container_name: aegis-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AEGIS_SEED_USER_EMAIL: ${AEGIS_SEED_USER_EMAIL}
      AEGIS_SEED_USER_PASSWORD: ${AEGIS_SEED_USER_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - aegis-db-data:/var/lib/postgresql/data
      - ../kubernetes/envs/mvp/infrastructure/db-init/manifests/init.sql:/docker-entrypoint-initdb.d/10-init.sql
      - ../kubernetes/envs/mvp/infrastructure/db-init/manifests/seed.sql:/tmp/seed.sql
    command: >
      sh -c "cp /tmp/seed.sql /docker-entrypoint-initdb.d/20-seed.sql &&
             chmod +r /docker-entrypoint-initdb.d/20-seed.sql &&
             sed -i \"s/:'AEGIS_SEED_USER_EMAIL'/'$${AEGIS_SEED_USER_EMAIL}'/g\" /docker-entrypoint-initdb.d/20-seed.sql &&
             sed -i \"s/:'AEGIS_SEED_USER_PASSWORD'/'$${AEGIS_SEED_USER_PASSWORD}'/g\" /docker-entrypoint-initdb.d/20-seed.sql &&
             docker-entrypoint.sh postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: aegis-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=db
    ports:
      - "7233:7233"
      - "8233:8233"
    depends_on:
      db:
        condition: service_healthy

  # --- Application Services ---
  brain:
    image: python:3.11-slim
    container_name: aegis-brain
    working_dir: /app
    restart: on-failure
    command: >
      sh -c "apt-get update && apt-get install -y git build-essential libpq-dev &&
             pip install uv &&
             uv sync --no-dev &&
             uv run python src/main.py"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db:5432
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE}
      - JWT_SECRET=${JWT_SECRET}
      - GRPC_PORT=${GRPC_PORT}
      - DEBUG=true
      - ENV=dev
    volumes:
      - ../../Aegis-AI-Brain:/app
    ports:
      - "50051:50051"
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_started

  gateway:
    image: golang:1.24-alpine
    container_name: aegis-gateway
    working_dir: /app
    restart: on-failure
    command: >
      sh -c "apk add --no-cache git build-base &&
             GOTOOLCHAIN=local+auto go run cmd/api/main.go"
    environment:
      - PORT=${PORT}
      - DB_HOST=db:5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BRAIN_GRPC_ADDR=brain:50051
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    volumes:
      - ../../Aegis-AI-Api-Gateway:/app
    depends_on:
      db:
        condition: service_healthy
      brain:
        condition: service_started

  dashboard:
    image: node:20
    container_name: aegis-dashboard
    working_dir: /app
    command: >
      sh -c "npm install --ignore-scripts &&
             npx panda codegen &&
             npm run dev -- --host"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    ports:
      - "3000:5173"
    volumes:
      - ../../Aegis-AI-Dashboard:/app
    depends_on:
      - gateway

  proxy:
    image: nginx:alpine
    container_name: aegis-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - gateway

  minio:
    image: minio/minio:latest
    container_name: aegis-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - aegis-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: aegis-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb local/aegis-telemetry || true;
      mc policy set public local/aegis-telemetry;
      "

  redis:
    image: redis:7.2-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - aegis-redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aegis-db-data:
  aegis-minio-data:
  aegis-redis-data:
