services:
  # --- Infrastructure ---
  db:
    image: postgres:16-alpine
    container_name: aegis-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AEGIS_SEED_USER_EMAIL: ${AEGIS_SEED_USER_EMAIL}
      AEGIS_SEED_USER_PASSWORD: ${AEGIS_SEED_USER_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - aegis-db-data:/var/lib/postgresql/data
      - ../kubernetes/envs/mvp/infrastructure/db-init/manifests/init.sql:/docker-entrypoint-initdb.d/10-init.sql
      - ../kubernetes/envs/mvp/infrastructure/db-init/manifests/seed.sql:/tmp/seed.sql
    command: >
      sh -c "cp /tmp/seed.sql /docker-entrypoint-initdb.d/20-seed.sql &&
             chmod +r /docker-entrypoint-initdb.d/20-seed.sql &&
             sed -i \"s/:'AEGIS_SEED_USER_EMAIL'/'$${AEGIS_SEED_USER_EMAIL}'/g\" /docker-entrypoint-initdb.d/20-seed.sql &&
             sed -i \"s/:'AEGIS_SEED_USER_PASSWORD'/'$${AEGIS_SEED_USER_PASSWORD}'/g\" /docker-entrypoint-initdb.d/20-seed.sql &&
             docker-entrypoint.sh postgres"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: aegis-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=db
    ports:
      - "7233:7233"
      - "8233:8233"
    depends_on:
      db:
        condition: service_healthy

  # --- Application Services ---
  brain:
    image: python:3.11-slim
    container_name: aegis-brain
    working_dir: /app
    restart: on-failure
    command: >
      sh -c "apt-get update && apt-get install -y git build-essential libpq-dev &&
             pip install uv &&
             uv sync --no-dev &&
             uv run alembic stamp head &&
             uv run python src/main.py"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DB_HOST=db:5432
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE}
      - JWT_SECRET=${JWT_SECRET}
      - GRPC_PORT=${GRPC_PORT}
      - BRAIN_TLS_ENABLE=true
      - BRAIN_TLS_CA_CERT=/etc/aegis/mtls/ca.pem
      - BRAIN_TLS_SERVER_CERT=/etc/aegis/mtls/brain.pem
      - BRAIN_TLS_SERVER_KEY=/etc/aegis/mtls/brain.key
      - DEBUG=true
      - ENV=${ENV:-dev}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_SECURE=${MINIO_SECURE}
      - MINIO_INGEST_BUCKET=${MINIO_INGEST_BUCKET}
      - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT:-minio:9000}
      - MINIO_EXTERNAL_SECURE=false
      - REDIS_HOST=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ONBOARDING_EMAIL_ENABLED=${ONBOARDING_EMAIL_ENABLED:-true}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-false}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-team@aegis-ai.fr}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      - AEGIS_EMAIL_API_KEY=${AEGIS_EMAIL_API_KEY:-}
      - AEGIS_EMAIL_API_URL=${AEGIS_EMAIL_API_URL:-https://api.resend.com/emails}
    volumes:
      - ../../Aegis-AI-Brain:/app
      - ./certs:/etc/aegis/mtls:ro
    ports:
      - "50051:50051"
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_started
      mailpit:
        condition: service_started

  gateway:
    image: golang:1.24-alpine
    container_name: aegis-gateway
    working_dir: /app
    restart: on-failure
    command: >
      sh -c "apk add --no-cache git build-base &&
             GOTOOLCHAIN=local+auto go run cmd/api/main.go"
    environment:
      - PORT=${PORT}
      - DB_HOST=db:5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BRAIN_GRPC_ADDR=brain:50051
      - BRAIN_TLS_ENABLE=true
      - BRAIN_TLS_CA_CERT=/etc/aegis/mtls/ca.pem
      - BRAIN_TLS_CLIENT_CERT=/etc/aegis/mtls/gateway.pem
      - BRAIN_TLS_CLIENT_KEY=/etc/aegis/mtls/gateway.key
      - BRAIN_TLS_SERVER_NAME=brain
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - NEO4J_URL=http://neo4j:7474
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_password}
      - NEO4J_DATABASE=neo4j
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET:-aegis-telemetry}
      - MINIO_USE_SSL=false
    ports:
      - "8080:8080"
    volumes:
      - ../../Aegis-AI-Api-Gateway:/app
      - ./certs:/etc/aegis/mtls:ro
    depends_on:
      db:
        condition: service_healthy
      brain:
        condition: service_started

  dashboard:
    image: node:20
    container_name: aegis-dashboard
    working_dir: /app
    command: >
      sh -c "npm install --ignore-scripts &&
             npx panda codegen &&
             npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "3000:5173"
    volumes:
      - ../../Aegis-AI-Dashboard:/app
    depends_on:
      - gateway

  landing:
    image: node:20
    container_name: aegis-landing
    working_dir: /app
    command: >
      sh -c "npm install --ignore-scripts &&
             npx next dev -p 3001"
    ports:
      - "3001:3001"
    volumes:
      - ../../Aegis-AI-Landing:/app
    depends_on:
      - gateway

  proxy:
    image: nginx:alpine
    container_name: aegis-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - gateway
      - landing

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: aegis-cloudflared
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    restart: unless-stopped
    depends_on:
      - proxy

  minio:
    image: minio/minio:latest
    container_name: aegis-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - aegis-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: aegis-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " set -e; mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; mc mb local/aegis-telemetry || true; mc policy set public local/aegis-telemetry; mc mb local/aegis-ingest || true; mc mb local/releases || true; mc policy set public local/releases; "

  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}", "--notify-keyspace-events", "Ex" ]
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - aegis-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: aegis-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: aegis-clickhouse
    ports:
      - "8123:8123"
      - "9002:9000"
    environment:
      - CLICKHOUSE_USER=aegis_admin
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse_password}
      - CLICKHOUSE_DB=aegis_telemetry
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - aegis-clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-users.xml:/etc/clickhouse-server/users.d/aegis_users.xml
    restart: on-failure
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    container_name: aegis-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-neo4j_password}
    volumes:
      - aegis-neo4j-data:/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j-schema-init:
    image: neo4j:5-community
    container_name: aegis-neo4j-schema-init
    environment:
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_password}
    volumes:
      - ./neo4j-init.cypher:/schema/neo4j-init.cypher:ro
    depends_on:
      neo4j:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        cypher-shell -a neo4j://neo4j:7687 -u neo4j -p "$${NEO4J_PASSWORD}" -f /schema/neo4j-init.cypher
        cypher-shell -a neo4j://neo4j:7687 -u neo4j -p "$${NEO4J_PASSWORD}" "SHOW CONSTRAINTS YIELD name RETURN name"

  worker-ingest:
    build:
      context: ../../Aegis-AI-Worker-Ingest
      dockerfile: Dockerfile
    container_name: aegis-worker-ingest
    restart: on-failure
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=aegis_admin
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse_password}
      - CLICKHOUSE_DB=aegis_telemetry
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=aegis-ingest
      - NEO4J_URL=http://neo4j:7474
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_password}
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      temporal:
        condition: service_started
      neo4j-schema-init:
        condition: service_completed_successfully


volumes:
  aegis-db-data:
  aegis-minio-data:
  aegis-redis-data:
  aegis-clickhouse-data:
  aegis-neo4j-data:
