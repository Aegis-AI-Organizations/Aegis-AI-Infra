nameOverride: "ingest-worker-mvp"

# Workers are started on demand; keep the baseline scaled to zero.
replicaCount: 0

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-worker-ingest
  tag: "latest"
  pullPolicy: Always

autoscaling:
  enabled: false

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

probes:
  enabled: false

env:
  - name: TEMPORAL_HOST
    value: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local:7233"
  - name: TEMPORAL_NAMESPACE
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: TEMPORAL_NAMESPACE
  - name: TEMPORAL_TLS_ENABLE
    value: "false"
  - name: TEMPORAL_TLS_CA_PATH
    value: "/etc/temporal/config/tls/ca.crt"
  - name: TEMPORAL_TLS_CERT_PATH
    value: "/etc/temporal/config/tls/tls.crt"
  - name: TEMPORAL_TLS_KEY_PATH
    value: "/etc/temporal/config/tls/tls.key"
  - name: TEMPORAL_TLS_SERVER_NAME
    value: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local"
  - name: REDIS_HOST
    value: "aegis-redis-mvp-master.aegis-system.svc.cluster.local"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: REDIS_PASSWORD
  - name: CLICKHOUSE_HOST
    value: "aegis-clickhouse-mvp.aegis-system.svc.cluster.local"
  - name: CLICKHOUSE_PORT
    value: "8123"
  - name: CLICKHOUSE_USER
    value: "aegis_admin"
  - name: CLICKHOUSE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: CLICKHOUSE_PASSWORD
  - name: CLICKHOUSE_DB
    value: "default"
  - name: MINIO_ENDPOINT
    value: "aegis-minio-mvp:9000"
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: MINIO_ROOT_USER
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: MINIO_ROOT_PASSWORD
  - name: MINIO_BUCKET
    value: "aegis-ingest"
  - name: NEO4J_URL
    value: "http://aegis-neo4j-mvp.aegis-system.svc.cluster.local:7474"
  - name: NEO4J_USER
    value: "neo4j"
  - name: NEO4J_PASSWORD
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: NEO4J_PASSWORD

volumeMounts:
  - name: temporal-tls
    mountPath: /etc/temporal/config/tls
    readOnly: true

volumes:
  - name: temporal-tls
    secret:
      secretName: temporal-client-tls

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

networkPolicy:
  enabled: true
  allowDNS: true
  egress:
    - toServices:
        - serviceName: aegis-temporal-mvp-frontend
          namespace: aegis-system
      ports:
        - port: 7233
          protocol: TCP
    - toServices:
        - serviceName: aegis-clickhouse-mvp
          namespace: aegis-system
      ports:
        - port: 8123
          protocol: TCP
    - toServices:
        - serviceName: aegis-minio-mvp
          namespace: aegis-system
      ports:
        - port: 9000
          protocol: TCP
    - toServices:
        - serviceName: aegis-neo4j-mvp
          namespace: aegis-system
      ports:
        - port: 7474
          protocol: TCP

keda:
  enabled: true
  minReplicaCount: 0
  maxReplicaCount: 20
  pollingInterval: 15
  cooldownPeriod: 300
  triggerAuthentication:
    enabled: true
    name: ingest-worker-temporal-auth
    spec:
      secretTargetRef:
        - parameter: ca
          name: temporal-client-tls
          key: ca.crt
        - parameter: cert
          name: temporal-client-tls
          key: tls.crt
        - parameter: key
          name: temporal-client-tls
          key: tls.key
  triggers:
    - type: temporal
      metadata:
        namespace: "default"
        taskQueue: "INGEST_TASK_QUEUE"
        queueTypes: "workflow,activity"
        targetQueueSize: "1"
        activationTargetQueueSize: "0"
        tlsServerName: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local"
        endpoint: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local:7233"
      authenticationRef:
        name: ingest-worker-temporal-auth
