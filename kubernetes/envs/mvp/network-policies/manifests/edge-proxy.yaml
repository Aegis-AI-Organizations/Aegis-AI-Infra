apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: defaults-edge-proxy
  namespace: aegis-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: aegis-edge-proxy
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: cloudflared
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            app: api-gateway-mvp
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
