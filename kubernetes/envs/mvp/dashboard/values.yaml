nameOverride: "dashboard-mvp"

replicaCount: 1

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-dashboard
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80
annotations:
  cert-manager.io/cluster-issuer: aegis-ca-issuer
ingress:
  enabled: true
  className: "nginx"
  tls:
    - hosts:
        - app.aegis.mvp.local
      secretName: dashboard-tls
  hosts:
    - host: app.aegis.mvp.local
      paths:
        - path: /
          pathType: ImplementationSpecific

env:
  - name: API_GATEWAY_URL
    value: "/api"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

initContainers:
  - name: config-init
    image: busybox:latest
    command: ["sh", "-c", "cp /tmp/nginx/default.conf /etc/nginx/conf.d/default.conf"]
    volumeMounts:
      - name: nginx-cm-volume
        mountPath: /tmp/nginx
      - name: nginx-conf-dir
        mountPath: /etc/nginx/conf.d

volumeMounts:
  - name: nginx-conf-dir
    mountPath: /etc/nginx/conf.d

volumes:
  - name: nginx-cm-volume
    configMap:
      name: dashboard-nginx-config
  - name: nginx-conf-dir
    emptyDir: {}

networkPolicy:
  enabled: true
  allowDNS: true
  ingress:
    - fromEntities:
        - world
      ports:
        - port: 80
          protocol: TCP
