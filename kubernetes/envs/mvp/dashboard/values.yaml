nameOverride: "dashboard-mvp"

replicaCount: 1

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-dashboard
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: app.aegis.mvp.local
      paths:
        - path: /
          pathType: ImplementationSpecific

env:
  - name: API_GATEWAY_URL
    value: "/api"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

networkPolicy:
  enabled: true
  allowDNS: true
  ingress:
    - fromEntities:
        - world
      ports:
        - port: 80
          protocol: TCP
