nameOverride: "brain-mvp"
annotations:
  restart-dummy: "1"

replicaCount: 1

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-brain
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  grpcPort: 50051

env:
  - name: ALEMBIC_BASELINE_EXISTING_SCHEMA
    value: "true"
  - name: DB_HOST
    value: "aegis-postgres-mvp-postgresql.aegis-system.svc.cluster.local:5432"
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: POSTGRES_USER
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: POSTGRES_PASSWORD
  - name: POSTGRES_DB
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: POSTGRES_DB
  - name: TEMPORAL_HOST
    value: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local:7233"
  - name: TEMPORAL_NAMESPACE
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: TEMPORAL_NAMESPACE
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: JWT_SECRET
  - name: TEMPORAL_TLS_ENABLE
    value: "true"
  - name: TEMPORAL_TLS_CA_PATH
    value: "/etc/temporal/config/tls/ca.crt"
  - name: TEMPORAL_TLS_CERT_PATH
    value: "/etc/temporal/config/tls/tls.crt"
  - name: TEMPORAL_TLS_KEY_PATH
    value: "/etc/temporal/config/tls/tls.key"
  - name: BRAIN_TLS_ENABLE
    value: "true"
  - name: BRAIN_TLS_CA_CERT
    value: "/etc/brain/certs/ca.crt"
  - name: BRAIN_TLS_SERVER_CERT
    value: "/etc/brain/certs/tls.crt"
  - name: BRAIN_TLS_SERVER_KEY
    value: "/etc/brain/certs/tls.key"
  - name: MINIO_ENDPOINT
    value: "aegis-minio-mvp:9000"
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: MINIO_ROOT_USER
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: MINIO_ROOT_PASSWORD
  - name: MINIO_SECURE
    value: "false"
  - name: MINIO_INGEST_BUCKET
    value: "aegis-ingest"
  - name: MINIO_EXTERNAL_ENDPOINT
    value: "storage.aegis-ai.fr"
  - name: MINIO_EXTERNAL_SECURE
    value: "true"
  - name: REDIS_HOST
    value: "aegis-redis-mvp-master.aegis-system.svc.cluster.local:6379"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: REDIS_PASSWORD
  - name: ENV
    value: "production"
  - name: FRONTEND_BASE_URL
    value: "https://app.aegis-ai.fr"
  - name: ONBOARDING_EMAIL_ENABLED
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: ONBOARDING_EMAIL_ENABLED
  - name: SMTP_HOST
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: SMTP_HOST
  - name: SMTP_PORT
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: SMTP_PORT
  - name: SMTP_USERNAME
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: SMTP_USERNAME
  - name: SMTP_PASSWORD
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: SMTP_PASSWORD
  - name: SMTP_USE_TLS
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: SMTP_USE_TLS
  - name: SMTP_FROM_EMAIL
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: SMTP_FROM_EMAIL
  - name: AEGIS_EMAIL_API_KEY
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: AEGIS_EMAIL_API_KEY
  - name: AEGIS_EMAIL_API_URL
    value: "https://api.resend.com/emails"

volumeMounts:
  - name: temporal-tls
    mountPath: /etc/temporal/config/tls
    readOnly: true
  - name: brain-server-tls
    mountPath: /etc/brain/certs
    readOnly: true

volumes:
  - name: temporal-tls
    secret:
      secretName: temporal-client-tls
  - name: brain-server-tls
    secret:
      secretName: brain-server-tls

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

serviceAccount:
  create: true

rbac:
  create: true
  clusterRole: true
  rules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: ["*"]

initContainers:
  - name: wait-for-postgres
    image: alpine
    command: ["sh", "-c", "until nc -zv aegis-postgres-mvp-postgresql.aegis-system.svc.cluster.local 5432; do echo 'Waiting for postgres...'; sleep 3; done"]
  - name: wait-for-temporal
    image: alpine
    command: ["sh", "-c", "until nc -zv aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local 7233; do echo 'Waiting for temporal...'; sleep 3; done"]

networkPolicy:
  enabled: true
  allowDNS: true
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: api-gateway-mvp
      ports:
        - port: 50051
          protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: postgresql
            app.kubernetes.io/instance: aegis-postgres-mvp
      ports:
        - port: 5432
          protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/instance: aegis-temporal-mvp
      ports:
        - port: 7233
          protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: minio
            app.kubernetes.io/instance: aegis-minio-mvp
      ports:
        - port: 9000
          protocol: TCP
    - toEntities:
        - kube-apiserver
      ports:
        - port: 443
          protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: minio
            app.kubernetes.io/instance: aegis-minio-mvp
      ports:
        - port: 9000
          protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: redis
            app.kubernetes.io/instance: aegis-redis-mvp
      ports:
        - port: 6379
          protocol: TCP
    - toEntities:
        - world
      ports:
        - port: 587
          protocol: TCP
