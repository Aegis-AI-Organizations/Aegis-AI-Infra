apiVersion: v1
kind: Service
metadata:
  name: aegis-edge-proxy
  namespace: aegis-system
  labels:
    app.kubernetes.io/name: aegis-edge-proxy
    app.kubernetes.io/part-of: aegis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegis-edge-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: proxy
  namespace: aegis-system
  labels:
    app.kubernetes.io/name: aegis-edge-proxy
    app.kubernetes.io/part-of: aegis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegis-edge-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
