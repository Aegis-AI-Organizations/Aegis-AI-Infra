apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-edge-proxy
  namespace: aegis-system
  labels:
    app.kubernetes.io/name: aegis-edge-proxy
    app.kubernetes.io/part-of: aegis
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-edge-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-edge-proxy
        app.kubernetes.io/part-of: aegis
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: aegis-edge-proxy-config
