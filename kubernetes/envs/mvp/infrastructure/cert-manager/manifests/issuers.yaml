apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: aegis-selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: aegis-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: aegis-ca
  secretName: aegis-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: aegis-selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: aegis-ca-issuer
spec:
  ca:
    secretName: aegis-ca-secret
