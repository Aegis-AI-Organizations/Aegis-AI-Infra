apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-keda-mvp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://kedacore.github.io/charts
    targetRevision: "2.19.0"
    chart: keda
    helm:
      values: |
        serviceAccount:
          create: true
          annotations: {}
          name: keda-operator
        rbac:
          create: true
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
