prometheus:
  enabled: false
grafana:
  enabled: false
cassandra:
  enabled: false
postgresql:
  enabled: false
elasticsearch:
  enabled: false

server:
  replicaCount: 1
  config:
    persistence:
      numHistoryShards: 512
      defaultStore: default
      visibilityStore: visibility
      default:
        driver: "sql"
        sql:
          pluginName: "postgres"
          driverName: "postgres"
          host: "aegis-postgres-mvp-postgresql"
          port: 5432
          database: "aegis_persistence"
          user: "aegis_admin"
          passwordSecretName: "aegis-env"
          passwordSecretKey: "POSTGRES_PASSWORD"
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
      visibility:
        driver: "sql"
        sql:
          pluginName: "postgres"
          driverName: "postgres"
          host: "aegis-postgres-mvp-postgresql"
          port: 5432
          database: "aegis_visibility"
          user: "aegis_admin"
          passwordSecretName: "aegis-env"
          passwordSecretKey: "POSTGRES_PASSWORD"
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
