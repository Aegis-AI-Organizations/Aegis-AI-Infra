prometheus:
  enabled: false
grafana:
  enabled: false
cassandra:
  enabled: false
mysql:
  enabled: false
postgresql:
  enabled: false
elasticsearch:
  enabled: false

server:
  replicaCount: 1
  # Injection MULTI-SERVICES pour forcer l'activation de Postgres
  frontend:
    additionalEnv: &sql_env
      - name: TEMPORAL_CONFIG_DIR
        value: "/etc/temporal/config"
      - name: DB
        value: "postgresql"
      - name: SQL_PLUGIN
        value: "postgres12"
      - name: SQL_HOST
        value: "aegis-postgres-mvp-postgresql"
      - name: SQL_PORT
        value: "5432"
  history:
    additionalEnv: *sql_env
  matching:
    additionalEnv: *sql_env
  worker:
    additionalEnv: *sql_env
  config:
    persistence:
      numHistoryShards: 512
      defaultStore: default
      visibilityStore: visibility
      default:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "aegis-postgres-mvp-postgresql"
          port: 5432
          database: "aegis_persistence"
          user: "aegis_admin"
          existingSecret: "aegis-env"
          secretKey: "POSTGRES_PASSWORD"
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
      visibility:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "aegis-postgres-mvp-postgresql"
          port: 5432
          database: "aegis_visibility"
          user: "aegis_admin"
          existingSecret: "aegis-env"
          secretKey: "POSTGRES_PASSWORD"
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
