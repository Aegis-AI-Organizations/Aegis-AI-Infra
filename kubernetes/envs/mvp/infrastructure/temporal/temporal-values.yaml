prometheus:
  enabled: false
grafana:
  enabled: false
cassandra:
  enabled: false
mysql:
  enabled: false
postgresql:
  enabled: false
elasticsearch:
  enabled: false

server:
  replicaCount: 1
  # Utilisation des variables natives de l'image Docker Temporal ("Magic vars")
  additionalEnv:
    - name: DB
      value: "postgres12"
    - name: POSTGRES_SEEDS
      value: "aegis-postgres-mvp-postgresql"
    - name: POSTGRES_USER
      value: "aegis_admin"
    - name: POSTGRES_PWD
      valueFrom:
        secretKeyRef:
          name: aegis-env
          key: POSTGRES_PASSWORD
    - name: DBNAME
      value: "aegis_persistence"
    - name: VISIBILITY_DBNAME
      value: "aegis_visibility"
  config:
    persistence:
      numHistoryShards: 512
      defaultStore: default
      visibilityStore: visibility
      default:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "aegis-postgres-mvp-postgresql"
          port: 5432
          database: "aegis_persistence"
          user: "aegis_admin"
          existingSecret: "aegis-env"
          secretKey: "POSTGRES_PASSWORD"
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
      visibility:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "aegis-postgres-mvp-postgresql"
          port: 5432
          database: "aegis_visibility"
          user: "aegis_admin"
          existingSecret: "aegis-env"
          secretKey: "POSTGRES_PASSWORD"
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"
