apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-temporal-mvp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://go.temporal.io/helm-charts
    chart: temporal
    targetRevision: 0.x.x
    helm:
      valuesObject:
        server:
          replicaCount: 1
          config:
            persistence:
              defaultStore: default
              visibilityStore: visibility
              default:
                cassandra: null
                sql:
                  driver: "postgres"
                  host: "aegis-postgres-mvp-postgresql"
                  port: 5432
                  database: "temporal"
                  user: "aegis_admin"
                  existingSecret: "aegis-env"
                  secretKey: "POSTGRES_PASSWORD"
              visibility:
                cassandra: null
                sql:
                  driver: "postgres"
                  host: "aegis-postgres-mvp-postgresql"
                  port: 5432
                  database: "temporal_visibility"
                  user: "aegis_admin"
                  existingSecret: "aegis-env"
                  secretKey: "POSTGRES_PASSWORD"
        schema:
          setup:
            enabled: true
          update:
            enabled: true
        prometheus:
          enabled: false
        grafana:
          enabled: false
        cassandra:
          enabled: true
          replicaCount: 0
          config:
            ports:
              cql: 9042
        postgresql:
          enabled: false
        elasticsearch:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
