apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-temporal-mvp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://temporalio.github.io/helm-charts
    chart: temporal
    targetRevision: 0.39.0
    helm:
      valuesObject:
        server:
          replicaCount: 1
        cassandra:
          enabled: true
          config:
            cluster_size: 1
            seed_size: 1
            num_tokens: 4
        prometheus:
          enabled: false
        grafana:
          enabled: false
        postgresql:
          enabled: false
        elasticsearch:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
