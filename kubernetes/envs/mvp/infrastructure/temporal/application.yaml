apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-temporal-mvp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://temporalio.github.io/helm-charts
      chart: temporal
      targetRevision: 0.74.0
      helm:
        valueFiles:
          - $values/kubernetes/envs/mvp/infrastructure/temporal/temporal-values.yaml
    - repoURL: https://github.com/Aegis-AI-Organizations/Aegis-AI-Infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
