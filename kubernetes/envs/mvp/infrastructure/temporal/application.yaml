apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-temporal-mvp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://temporalio.github.io/helm-charts
    chart: temporal
    targetRevision: 0.x.x
    helm:
      valuesObject:
        server:
          replicaCount: 1
          config:
            persistence:
              default:
                sql:
                  pluginName: "postgres12"
                  databaseName: "temporal"
                  connectAddr: "aegis-postgres-mvp-postgresql:5432"
                  user: "aegis_admin"
                  existingSecret: "aegis-env"
                  existingSecretPasswordKey: "POSTGRES_PASSWORD"
              visibility:
                sql:
                  pluginName: "postgres12"
                  databaseName: "temporal_visibility"
                  connectAddr: "aegis-postgres-mvp-postgresql:5432"
                  user: "aegis_admin"
                  existingSecret: "aegis-env"
                  existingSecretPasswordKey: "POSTGRES_PASSWORD"
        prometheus:
          enabled: false
        grafana:
          enabled: false
        cassandra:
          enabled: false
        postgresql:
          enabled: false
        elasticsearch:
          replicas: 1
          minimumMasterNodes: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
