apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-temporal-mvp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://temporalio.github.io/helm-charts
    chart: temporal
    targetRevision: 0.74.0
    helm:
      valuesObject:
        server:
          replicaCount: 1
          config:
            persistence:
              defaultStore: default
              visibilityStore: visibility
              default:
                driver: "sql"
                cassandra:
                  hosts: ["cassandra"]
                  port: 9042
                sql:
                  driver: "postgres12" # Wait! Chart uses pluginName?
                  host: "aegis-postgres-mvp-postgresql"
                  port: 5432
                  user: "aegis_admin"
                  existingSecret: "aegis-temporal-mvp-default-store"
                  secretKey: "password"
                  database: "temporal"
              visibility:
                driver: "sql"
                cassandra:
                  hosts: ["cassandra"]
                  port: 9042
                sql:
                  driver: "postgres12" # Wait! Chart uses pluginName?
                  host: "aegis-postgres-mvp-postgresql"
                  port: 5432
                  user: "aegis_admin"
                  existingSecret: "aegis-temporal-mvp-default-store"
                  secretKey: "password"
                  database: "temporal_visibility"
        schema:
          setup:
            enabled: true
          update:
            enabled: true
        prometheus:
          enabled: false
        grafana:
          enabled: false
        cassandra:
          enabled: false
        postgresql:
          enabled: false
        elasticsearch:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
