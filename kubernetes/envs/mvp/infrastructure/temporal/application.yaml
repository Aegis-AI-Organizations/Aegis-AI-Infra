apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-temporal-mvp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://temporalio.github.io/helm-charts
    chart: temporal
    targetRevision: 0.74.0
    helm:
      valuesObject:
        server:
          replicaCount: 1
          config:
            persistence:
              defaultStore: sql-default
              visibilityStore: sql-visibility
              numHistoryShards: 512
              datastores:
                sql-default:
                  sql:
                    createDatabase: true
                    manageSchema: true
                    pluginName: postgres12
                    driverName: postgres12
                    databaseName: temporal
                    connectAddr: "aegis-postgres-mvp-postgresql:5432"
                    connectProtocol: tcp
                    user: aegis_admin
                    existingSecret: aegis-env
                    secretKey: POSTGRES_PASSWORD
                    maxConns: 20
                    maxIdleConns: 20
                    maxConnLifetime: "1h"
                sql-visibility:
                  sql:
                    createDatabase: true
                    manageSchema: true
                    pluginName: postgres12
                    driverName: postgres12
                    databaseName: temporal_visibility
                    connectAddr: "aegis-postgres-mvp-postgresql:5432"
                    connectProtocol: tcp
                    user: aegis_admin
                    existingSecret: aegis-env
                    secretKey: POSTGRES_PASSWORD
        prometheus:
          enabled: false
        grafana:
          enabled: false
        cassandra:
          enabled: false
        postgresql:
          enabled: false
        elasticsearch:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
