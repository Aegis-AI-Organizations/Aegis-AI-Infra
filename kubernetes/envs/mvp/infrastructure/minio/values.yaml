global:
  imageRegistry: public.ecr.aws
  storageClass: "local-path" # Use local-path for MVP dev cluster

auth:
  existingSecret: "aegis-env"
  rootUserSecretKey: "MINIO_ROOT_USER"
  rootPasswordSecretKey: "MINIO_ROOT_PASSWORD"

persistence:
  enabled: true
  size: 10Gi

defaultBuckets: "aegis-telemetry,aegis-ingest"

service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"
