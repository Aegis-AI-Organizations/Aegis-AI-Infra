apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aegis-minio-mvp
  namespace: aegis-system
  labels:
    app.kubernetes.io/instance: aegis-minio-mvp
    app.kubernetes.io/name: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
