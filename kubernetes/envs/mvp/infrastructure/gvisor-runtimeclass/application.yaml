apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-gvisor-runtimeclass-mvp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/Aegis-AI-Organizations/Aegis-AI-Infra.git
    targetRevision: main
    path: kubernetes/envs/mvp/infrastructure/gvisor-runtimeclass/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
