nameOverride: "api-gateway-mvp"
annotations:
  restart-dummy: "3"
  cert-manager.io/cluster-issuer: aegis-ca-issuer

replicaCount: 1

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-api-gateway
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  tls:
    - hosts:
        - api.aegis.mvp.local
      secretName: api-gateway-tls
  hosts:
    - host: api.aegis.mvp.local
      paths:
        - path: /
          pathType: ImplementationSpecific

env:
  - name: DB_HOST
    value: "aegis-postgres-mvp-postgresql.aegis-system.svc.cluster.local:5432"
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: POSTGRES_USER
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: POSTGRES_PASSWORD
  - name: POSTGRES_DB
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: POSTGRES_DB
  - name: BRAIN_GRPC_ADDR
    value: "brain-mvp:50051"
  - name: TEMPORAL_HOST
    value: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local:7233"
  - name: TEMPORAL_NAMESPACE
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: TEMPORAL_NAMESPACE
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: JWT_SECRET
  - name: ALLOWED_ORIGINS
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: ALLOWED_ORIGINS
  - name: TEMPORAL_TLS_ENABLE
    value: "true"
  - name: TEMPORAL_TLS_CA_PATH
    value: "/etc/temporal/config/tls/ca.crt"
  - name: TEMPORAL_TLS_CERT_PATH
    value: "/etc/temporal/config/tls/tls.crt"
  - name: TEMPORAL_TLS_KEY_PATH
    value: "/etc/temporal/config/tls/tls.key"
  - name: BRAIN_TLS_ENABLE
    value: "true"
  - name: BRAIN_TLS_CA_CERT
    value: "/etc/brain/certs/ca.crt"
  - name: BRAIN_TLS_CLIENT_CERT
    value: "/etc/brain/certs/tls.crt"
  - name: BRAIN_TLS_CLIENT_KEY
    value: "/etc/brain/certs/tls.key"
  - name: BRAIN_TLS_SERVER_NAME
    value: "brain-mvp.aegis-system.svc.cluster.local"

volumeMounts:
  - name: temporal-tls
    mountPath: /etc/temporal/config/tls
    readOnly: true
  - name: brain-client-tls
    mountPath: /etc/brain/certs
    readOnly: true

volumes:
  - name: temporal-tls
    secret:
      secretName: temporal-client-tls
  - name: brain-client-tls
    secret:
      secretName: brain-client-tls

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

initContainers:
  - name: wait-for-postgres
    image: alpine
    command: ["sh", "-c", "until nc -zv aegis-postgres-mvp-postgresql.aegis-system.svc.cluster.local 5432; do echo 'Waiting for postgres...'; sleep 3; done"]
  - name: wait-for-temporal
    image: alpine
    command: ["sh", "-c", "until nc -zv aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local 7233; do echo 'Waiting for temporal...'; sleep 3; done"]

networkPolicy:
  enabled: true
  allowDNS: true
  ingress:
    - fromEntities:
        - world
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: postgresql
            app.kubernetes.io/instance: aegis-postgres-mvp
      ports:
        - port: 5432
          protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/instance: aegis-temporal-mvp
            app.kubernetes.io/component: frontend
      ports:
        - port: 7233
          protocol: TCP
    - toEndpoints:
        - matchLabels:
            app: brain-mvp
      ports:
        - port: 50051
          protocol: TCP
