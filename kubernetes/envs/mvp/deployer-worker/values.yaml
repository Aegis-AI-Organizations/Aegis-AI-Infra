nameOverride: "deployer-worker-mvp"

replicaCount: 0

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-worker-deployer
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

probes:
  enabled: false

env:
  - name: TEMPORAL_HOST
    value: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local:7233"
  - name: TEMPORAL_NAMESPACE
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: TEMPORAL_NAMESPACE
  - name: DEPLOYER_TASK_QUEUE
    value: "DEPLOYER_TASK_QUEUE"
  - name: TEMPORAL_TLS_ENABLE
    value: "true"
  - name: TEMPORAL_TLS_CA_PATH
    value: "/etc/temporal/config/tls/ca.crt"
  - name: TEMPORAL_TLS_CERT_PATH
    value: "/etc/temporal/config/tls/tls.crt"
  - name: TEMPORAL_TLS_KEY_PATH
    value: "/etc/temporal/config/tls/tls.key"
  - name: TEMPORAL_TLS_SERVER_NAME
    value: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local"

volumeMounts:
  - name: temporal-tls
    mountPath: /etc/temporal/config/tls
    readOnly: true

volumes:
  - name: temporal-tls
    secret:
      secretName: temporal-client-tls

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

serviceAccount:
  create: true
  automountToken: true

rbac:
  create: true
  clusterRole: true
  rules:
    - apiGroups: [""]
      resources: ["namespaces"]
      verbs: ["create", "delete"]
    - apiGroups: [""]
      resources: ["pods", "services"]
      verbs: ["create", "get", "list", "watch", "delete"]

networkPolicy:
  enabled: true
  allowDNS: true
  egress:
    - toServices:
        - serviceName: aegis-temporal-mvp-frontend
          namespace: aegis-system
      ports:
        - port: 7233
          protocol: TCP
    - toEntities:
        - kube-apiserver
      ports:
        - port: 443
          protocol: TCP

keda:
  enabled: true
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 300
  triggers:
    - type: temporal
      metadata:
        namespace: "default"
        taskQueue: "DEPLOYER_TASK_QUEUE"
        useTLS: "false"
        endpoint: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local:7233"
