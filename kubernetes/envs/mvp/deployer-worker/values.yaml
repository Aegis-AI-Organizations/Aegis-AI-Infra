nameOverride: "deployer-worker-mvp"

replicaCount: 0
terminationGracePeriodSeconds: 900

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-worker-deployer
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

probes:
  enabled: false

env:
  - name: TEMPORAL_HOST
    value: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local:7233"
  - name: TEMPORAL_NAMESPACE
    valueFrom:
      secretKeyRef:
        name: aegis-env
        key: TEMPORAL_NAMESPACE
  - name: DEPLOYER_TASK_QUEUE
    value: "DEPLOYER_TASK_QUEUE"
  - name: TEMPORAL_TLS_ENABLE
    value: "false"
  - name: TEMPORAL_TLS_CA_PATH
    value: "/etc/temporal/config/tls/ca.crt"
  - name: TEMPORAL_TLS_CERT_PATH
    value: "/etc/temporal/config/tls/tls.crt"
  - name: TEMPORAL_TLS_KEY_PATH
    value: "/etc/temporal/config/tls/tls.key"
  - name: TEMPORAL_TLS_SERVER_NAME
    value: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local"
  - name: TEMPORAL_WORKER_STOP_TIMEOUT_SECONDS
    value: "840"

volumeMounts:
  - name: temporal-tls
    mountPath: /etc/temporal/config/tls
    readOnly: true

volumes:
  - name: temporal-tls
    secret:
      secretName: temporal-client-tls

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

serviceAccount:
  create: true
  automountToken: true

rbac:
  create: true
  clusterRole: true
  rules:
    # Kubernetes RBAC cannot express wildcard resourceNames such as
    # aegis-war-room-*. The deployer code enforces that namespace prefix before
    # every Kubernetes write, while RBAC omits namespace reads entirely so
    # reading "default" is denied.
    - apiGroups: [""]
      resources: ["namespaces"]
      verbs: ["create", "delete"]
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["create", "get"]
    - apiGroups: [""]
      resources: ["services"]
      verbs: ["create"]
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs: ["create", "get"]

sandboxNamespacePolicy:
  enabled: true
  prefix: "aegis-war-room-"

networkPolicy:
  enabled: true
  allowDNS: true
  egress:
    - toServices:
        - serviceName: aegis-temporal-mvp-frontend
          namespace: aegis-system
      ports:
        - port: 7233
          protocol: TCP
    - toEntities:
        - kube-apiserver
      ports:
        - port: 443
          protocol: TCP

keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 900
  triggers:
    - type: temporal
      metadata:
        namespace: "default"
        taskQueue: "DEPLOYER_TASK_QUEUE"
        useTLS: "false"
        queueTypes: "workflow,activity"
        targetQueueSize: "1"
        activationTargetQueueSize: "0"
        endpoint: "aegis-temporal-mvp-frontend.aegis-system.svc.cluster.local:7233"
