nameOverride: "api-gateway-pre-alpha"

replicaCount: 1

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-api-gateway
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: api.aegis.pre-alpha.local
      paths:
        - path: /
          pathType: ImplementationSpecific

env:
  - name: DB_HOST
    value: "aegis-postgres-pre-alpha-postgresql.aegis-system.svc.cluster.local:5432"
  - name: TEMPORAL_HOST
    value: "aegis-temporal-pre-alpha-frontend.aegis-system.svc.cluster.local:7233"

envFrom:
  - secretRef:
      name: aegis-env

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
