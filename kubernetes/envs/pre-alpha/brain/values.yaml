nameOverride: "brain-pre-alpha"

replicaCount: 1

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-brain
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

env:
  - name: DB_HOST
    value: "aegis-postgres-pre-alpha-postgresql.aegis-system.svc.cluster.local:5432"
  - name: TEMPORAL_HOST
    value: "aegis-temporal-pre-alpha-frontend.aegis-system.svc.cluster.local:7233"

envFrom:
  - secretRef:
      name: aegis-env

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

serviceAccount:
  create: true

rbac:
  create: true
  clusterRole: true
  rules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: ["*"]

initContainers:
  - name: wait-for-postgres
    image: alpine
    command: ["sh", "-c", "until nc -zv aegis-postgres-pre-alpha-postgresql.aegis-system.svc.cluster.local 5432; do echo 'Waiting for postgres...'; sleep 3; done"]
  - name: wait-for-temporal
    image: alpine
    command: ["sh", "-c", "until nc -zv aegis-temporal-pre-alpha-frontend.aegis-system.svc.cluster.local 7233; do echo 'Waiting for temporal...'; sleep 3; done"]
