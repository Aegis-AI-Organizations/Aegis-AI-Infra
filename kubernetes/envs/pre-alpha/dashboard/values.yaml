nameOverride: "dashboard-pre-alpha"

replicaCount: 1

image:
  repository: ghcr.io/aegis-ai-organizations/aegis-ai-dashboard
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: app.aegis.pre-alpha.local
      paths:
        - path: /
          pathType: ImplementationSpecific

envFrom:
  - secretRef:
      name: aegis-env

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
