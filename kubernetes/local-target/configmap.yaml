apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-target-app
  namespace: aegis-local-target
data:
  app.py: |
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import parse_qs, urlparse
    import json
    import sqlite3

    FLAG = "aegis-flag-1234"

    DB = sqlite3.connect(":memory:", check_same_thread=False)
    DB.executescript(
        """
        CREATE TABLE products (id INTEGER PRIMARY KEY, name TEXT, secret TEXT);
        INSERT INTO products VALUES (1, 'starter-plan', 'public-demo-data');
        INSERT INTO products VALUES (2, 'admin-plan', 'aegis-flag-1234');
        """
    )

    class Handler(BaseHTTPRequestHandler):
        def _json(self, status, body):
            data = json.dumps(body).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def log_message(self, fmt, *args):
            return

        def do_GET(self):
            parsed = urlparse(self.path)
            if parsed.path == "/health":
                self._json(200, {"status": "ok"})
                return
            if parsed.path == "/":
                self._json(200, {"service": "Aegis-Target", "hint": "/search?q=' OR '1'='1"})
                return
            if parsed.path == "/search":
                payload = parse_qs(parsed.query).get("q", ["1"])[0]
                query = "SELECT id, name, secret FROM products WHERE name = '" + payload + "'"
            elif parsed.path == "/product":
                product_id = parse_qs(parsed.query).get("id", ["1"])[0]
                query = "SELECT id, name, secret FROM products WHERE id = " + product_id
            else:
                self._json(404, {"error": "not found"})
                return

            try:
                rows = DB.execute(query).fetchall()
                self._json(200, {
                    "query": query,
                    "rows": [{"id": r[0], "name": r[1], "secret": r[2]} for r in rows],
                })
            except Exception as exc:
                self._json(500, {"error": str(exc), "query": query})

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
