apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-target
  namespace: aegis-local-target
  labels:
    app.kubernetes.io/name: aegis-target
    app.kubernetes.io/part-of: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-target
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-target
        app.kubernetes.io/part-of: aegis
    spec:
      containers:
        - name: aegis-target
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/app.py"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: app
          configMap:
            name: aegis-target-app
