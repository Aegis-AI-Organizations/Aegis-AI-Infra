{{- if .Values.rbac.create -}}
{{- if .Values.rbac.clusterRole -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.nameOverride | default .Release.Name }}-cluster-role
rules:
{{ toYaml .Values.rbac.rules | indent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.nameOverride | default .Release.Name }}-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: {{ .Values.nameOverride | default .Release.Name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.nameOverride | default .Release.Name }}-cluster-role
  apiGroup: rbac.authorization.k8s.io
{{- else -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.nameOverride | default .Release.Name }}-role
  namespace: {{ .Release.Namespace }}
rules:
{{ toYaml .Values.rbac.rules | indent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.nameOverride | default .Release.Name }}-role-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.nameOverride | default .Release.Name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Values.nameOverride | default .Release.Name }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end -}}
{{- end -}}
