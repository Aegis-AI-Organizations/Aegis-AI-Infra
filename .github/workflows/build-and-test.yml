name: Module - Build & Test
on: workflow_call

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'
      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'
      - name: Validate Shell Scripts
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done
      - name: Validate Helm Charts
        run: |
          find kubernetes/charts -name Chart.yaml -print0 | while IFS= read -r -d '' chart; do
            helm lint "$(dirname "$chart")"
          done
      - name: Validate Kustomize Manifests
        run: |
          find kubernetes -name kustomization.yaml -print0 | while IFS= read -r -d '' manifest; do
            kubectl kustomize "$(dirname "$manifest")" >/dev/null
          done
      - name: Coverage Policy
        run: |
          echo "Coverage N/A: this repository is declarative infrastructure plus shell entrypoints, validated via syntax and manifest checks in CI."
